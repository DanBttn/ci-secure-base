name: Build and Push to Docker Hub

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Le scan qui échoue (Exit Code 1) s'il y a des failles
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      # NOUVEAU : On télécharge le modèle HTML officiel directement depuis le dépôt de Trivy
      - name: Download Trivy HTML Template
        if: always()
        run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      # 2. Génération du HTML
      - name: Generate HTML report
        uses: aquasecurity/trivy-action@master
        if: always() 
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "template"
          template: "@html.tpl" # CORRECTION : On pointe vers le fichier local qu'on vient de télécharger
          output: "report.html"

      # 3. Commit et Push du rapport
      - name: Commit and push report
        if: always() 
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add report.html
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Ajout du rapport Trivy (HTML) [skip ci]"
            git push
          else
            echo "Le rapport n'a pas changé, rien à push."
          fi

      # 4. Suite du pipeline (Docker)
      - name: Set up Docker Buildx
        if: success() 
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max